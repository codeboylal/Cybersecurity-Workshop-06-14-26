{% extends "base.html" %}
{% block title %}Register{% endblock %}
{% block content %}
<style>
  .auth-page { min-height: calc(100vh - 130px); display: flex; align-items: center; justify-content: center; padding: 32px; }
  .auth-card { background: white; border: 1px solid var(--border); border-radius: 16px; padding: 40px; width: 100%; max-width: 420px; }
  .submit-btn { width: 100%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; }
</style>
<div class="auth-page">
  <div class="auth-card">
    <div style="font-size:26px;font-weight:700;margin-bottom:6px">Create Account</div>
    <div style="color:var(--text-muted);font-size:14px;margin-bottom:28px">Join InnovateTech today</div>
    {% if error %}<div class="alert alert-danger">{{ error }}</div>{% endif %}
    <form method="POST">
      <div class="form-group"><label>Username</label><input type="text" name="username" required></div>
      <div class="form-group"><label>Email</label><input type="email" name="email" required></div>
      <div class="form-group"><label>Password</label><input type="password" name="password" required></div>
      <button type="submit" class="submit-btn">Create Account</button>
    </form>
    <div style="text-align:center;margin-top:20px;font-size:14px;color:var(--text-muted)">
      Already have an account? <a href="/login" style="color:var(--primary)">Sign in</a>
    </div>
  </div>
</div>
{% endblock %}
