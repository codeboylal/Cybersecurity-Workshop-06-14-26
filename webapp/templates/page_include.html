{% extends "base.html" %}
{% block title %}Page - {{ template }}{% endblock %}
{% block content %}
<div class="container page">
  <div style="margin-bottom:16px;padding:12px;background:#fffbeb;border:1px solid #fde68a;border-radius:8px;font-size:12px;color:#92400e">
    🔍 LFI Challenge: URL is /page?template={{ template }}<br>
    Try: <code>?template=../../secret/flag</code> or <code>?template=../../../etc/passwd</code>
  </div>
  <div class="card">
    <h3>Page Content (template: {{ template }})</h3>
    <pre style="margin-top:16px;white-space:pre-wrap;font-family:monospace;font-size:13px;background:#f8fafc;padding:16px;border-radius:8px;overflow:auto">{{ content }}</pre>
  </div>
</div>
{% endblock %}
