# InnovateTech Nginx - Intentionally misconfigured for lab
# Missing security headers, directory listing on /backup/, version disclosure

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Version disclosure NOT disabled (server_tokens on by default)
    # Fix: add 'server_tokens off;' here

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';

    access_log /var/log/nginx/access.log main;

    server {
        listen 80;
        server_name localhost innovatetech.local www.innovatetech.local;

        # Missing security headers (challenges #44, #46):
        # add_header X-Frame-Options SAMEORIGIN;
        # add_header X-Content-Type-Options nosniff;
        # add_header X-XSS-Protection "1; mode=block";
        # add_header Content-Security-Policy "default-src 'self'";
        # add_header Strict-Transport-Security "max-age=31536000";
        # add_header Referrer-Policy "strict-origin-when-cross-origin";

        # Custom header that leaks info (challenge #9)
        add_header X-Secret-Flag "FLAG{h34d3rs_t3ll_53cr3t5}";
        add_header X-Powered-By "PHP/7.2.34";

        # Proxy to Flask app
        location / {
            proxy_pass http://webapp:5000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 60s;
        }

        # Directory listing enabled on /backup (challenge #22)
        location /backup/ {
            alias /var/www/backup/;
            autoindex on;  # VULNERABILITY: exposes file listing
            autoindex_exact_size off;
            autoindex_localtime on;
        }

        # Proxy API
        location /api/ {
            proxy_pass http://webapp:5000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # SSRF note: /api/fetch goes to webapp which can reach internal services
    }

    # Admin subdomain (challenge #5 - subdomain enumeration)
    server {
        listen 80;
        server_name admin.innovatetech.local;

        location / {
            return 200 '<html><body style="background:#0f172a;color:#e2e8f0;font-family:monospace;padding:40px">
<h1 style="color:#60a5fa">Admin Subdomain Found!</h1>
<p>You discovered: <b>admin.innovatetech.local</b></p>
<p style="color:#4ade80;font-size:20px;margin:20px 0">FLAG{h1dd3n_subd0m41ns_3xp0s3d}</p>
<p>This subdomain was found via DNS enumeration. In the real world, this might be an unprotected admin panel!</p>
<p>Next steps: Check for <a href="http://admin.innovatetech.local/login" style="color:#60a5fa">login pages</a>, default creds, etc.</p>
</body></html>';
            add_header Content-Type text/html;
        }
    }

    # Port 8080 - alternative port (for recon)
    server {
        listen 8080;
        server_name localhost;

        location / {
            return 200 '{"service":"InnovateTech Internal","version":"2.1.0","env":"production","debug":false,"db":"mysql:3306","cache":"redis:6379"}';
            add_header Content-Type application/json;
        }
    }
}
