// InnovateTech DNS Server - INTENTIONALLY MISCONFIGURED FOR LAB
// Zone transfer allowed from ANY IP (vulnerability!)

options {
    directory "/var/cache/bind";
    allow-query { any; };
    // VULNERABLE: should be specific IPs, not 'any'
    allow-transfer { any; };
    recursion yes;
    dnssec-validation no;
    listen-on { any; };
    listen-on-v6 { any; };
};

zone "innovatetech.local" IN {
    type master;
    file "/etc/bind/zones/innovatetech.local.zone";
    // Zone transfer allowed from any IP - VULNERABILITY
    allow-transfer { any; };
};

zone "." IN {
    type hint;
    file "/usr/share/dns/root.hints";
};
